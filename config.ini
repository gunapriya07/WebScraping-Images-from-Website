# Web Image Scraper Configuration File
# Part of ProjectsHUB - Advanced Development Solutions

[DEFAULT]
# Default output directory for downloaded images
output_directory = downloads

# Default maximum number of images to download (0 = no limit)
max_images = 50

# Default minimum file size in KB
min_file_size_kb = 10

# Default number of download threads
max_workers = 5

# Default timeout for web requests in seconds
request_timeout = 30

# Use Selenium for dynamic content by default
use_selenium = true

# Wait time for page loading (seconds)
page_load_wait = 3

[SELENIUM]
# Selenium specific settings
headless = true
window_width = 1920
window_height = 1080
user_agent = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36

[FILTERS]
# Supported image extensions
supported_extensions = .jpg,.jpeg,.png,.gif,.bmp,.webp,.svg

# Image patterns to look for in URLs
image_patterns = image,img,photo,picture,thumb,gallery,media

[NETWORK]
# Network and request settings
max_retries = 3
retry_delay = 1
connection_pool_size = 10

# Request headers
accept = image/webp,image/apng,image/*,*/*;q=0.8
accept_language = en-US,en;q=0.9

[GUI]
# GUI specific settings
window_width = 800
window_height = 700
min_width = 700
min_height = 600

# Color scheme
primary_color = #2C3E50
secondary_color = #3498DB
success_color = #27AE60
warning_color = #F39C12
danger_color = #E74C3C
background_color = #FFFFFF

[LOGGING]
# Logging configuration
log_level = INFO
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
max_log_files = 5
max_log_size_mb = 10